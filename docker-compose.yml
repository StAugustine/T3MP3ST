services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: t3mp3st
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - T3MP3ST_HOST=0.0.0.0
      - T3MP3ST_PORT=3333
    volumes:
      - ./reports:/app/reports
      - ./evidence:/app/evidence
    ports:
      - "3333:3333"
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
